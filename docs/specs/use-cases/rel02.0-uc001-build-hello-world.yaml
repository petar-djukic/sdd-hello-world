id: rel02.0-uc001-build-hello-world
title: Build and Run Hello World Binary

summary: |
  We compile the sdd-hello-world Go binary from source and verify that it
  produces the expected output. This use case exercises the full path from
  Go source to running binary, validating that the code generated by the
  cobbler-scaffold pipeline is correct.

actor: Developer or CI pipeline

trigger: |
  Go source files exist at cmd/sdd-hello-world/main.go and
  cmd/sdd-hello-world/version.go after a generation cycle completes.

flow:
  - id: F1
    text: Run go build ./cmd/sdd-hello-world to compile the binary.
  - id: F2
    text: Verify the build succeeds with exit code 0 (gates F3; a failed build produces no binary to run).
  - id: F3
    text: Run the compiled binary (requires artifact from F1 and success confirmation from F2).
  - id: F4
    text: Capture stdout and the exit code (must happen during F3 execution to avoid lost output).
  - id: F5
    text: Verify stdout contains exactly "Hello, World!\n" and exit code is 0 (requires captured values from F4).

touchpoints:
  - id: T1
    text: |
      Binary component (cmd/sdd-hello-world/main.go) — exercises the main
      function that prints the greeting. Implements srd001-hello-world-binary
      R1.1, R2.1, R2.2, R2.3.
  - id: T2
    text: |
      Version file (cmd/sdd-hello-world/version.go) — confirms the version
      constant compiles alongside main.go. Implements srd001-hello-world-binary
      R1.2.
  - id: T3
    text: |
      Go module (go.mod) — validates that the module builds with zero external
      dependencies. Implements srd001-hello-world-binary R1.3.

success_criteria:
  - id: S1
    criterion: |
      The end-to-end sequence (build, run, capture, verify) completes: go build
      exits 0, the resulting binary prints exactly "Hello, World!\n" to stdout,
      and the binary exits 0. This exercises AC1 and AC2 together as an
      integration check that the generated source compiles and behaves correctly.
    traces: [AC1, AC2]

out_of_scope:
  - Testing with command-line arguments or flags
  - Cross-compilation or platform-specific behavior
  - Performance benchmarking

test_suite: test-rel02.0
