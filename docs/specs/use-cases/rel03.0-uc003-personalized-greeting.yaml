id: rel03.0-uc003-personalized-greeting
title: Personalized Greeting

summary: |
  We run the sdd-hello-world binary with and without the --name flag to
  verify that the greeting can be personalized. When --name is provided,
  the binary greets the specified name. When omitted, the default "Hello,
  World!" greeting is preserved.

actor: Developer or CI pipeline

trigger: |
  The compiled sdd-hello-world binary exists after a successful build, and
  the user or test harness invokes it with or without the --name flag.

flow:
  - id: F1
    text: Build the binary with go build ./cmd/sdd-hello-world.
  - id: F2
    text: Run the binary with --name Alice.
  - id: F3
    text: Capture stdout and exit code from the --name invocation.
  - id: F4
    text: Verify stdout is "Hello, Alice!\n" and exit code is 0.
  - id: F5
    text: Run the binary with no flags.
  - id: F6
    text: Capture stdout and exit code from the no-flags invocation.
  - id: F7
    text: Verify stdout is "Hello, World!\n" and exit code is 0 (default behavior preserved).

touchpoints:
  - id: T1
    text: |
      Binary component (cmd/sdd-hello-world/main.go) — exercises the --name
      flag parsing and greeting interpolation. Implements
      prd002-cli-enhancements R2.1, R2.2, R2.3.

success_criteria:
  - id: S1
    criterion: |
      The binary with --name Alice prints "Hello, Alice!\n" to stdout and
      exits with code 0.
    traces: [AC2]
  - id: S2
    criterion: |
      The binary with no flags prints "Hello, World!\n" to stdout and exits
      with code 0, preserving default behavior.
    traces: [AC3]

out_of_scope:
  - Empty string or special character handling for --name values
  - Multiple --name flags in a single invocation

test_suite: test-rel03.0
