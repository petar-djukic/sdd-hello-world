id: specifications-sdd-hello-world
title: SDD Hello World Specifications

overview: |
  SDD Hello World is a minimal test fixture for cobbler-scaffold. The project
  specifies a Go binary that prints "Hello, World!" and exits 0, with CLI
  enhancements (version, name, help flags) in a second release. The
  cobbler-scaffold generation pipeline reads the PRDs and produces the Go
  source files. For goals and boundaries see VISION.yaml. For components and
  structure see ARCHITECTURE.yaml.

roadmap_summary:
  - version: "01.0"
    name: Initial project and scaffold integration
    use_cases_done: 0
    use_cases_total: 0
    status: done
  - version: "02.0"
    name: Hello world binary from specifications
    use_cases_done: 0
    use_cases_total: 1
    status: pending
  - version: "03.0"
    name: CLI enhancements
    use_cases_done: 0
    use_cases_total: 3
    status: pending

prd_index:
  - id: prd001-hello-world-binary
    title: Hello World Binary
    summary: |
      Specifies the Go binary that prints "Hello, World!" and exits 0. Covers
      file structure (main.go, version.go), runtime behavior, and zero-dependency
      constraint.
    path: docs/specs/product-requirements/prd001-hello-world-binary.yaml
  - id: prd002-cli-enhancements
    title: CLI Enhancements
    summary: |
      Adds command-line flag support: --version prints the version constant,
      --name personalizes the greeting, --help shows usage, and unknown flags
      produce an error on stderr with exit code 1. Uses Go standard library
      flag package only.
    path: docs/specs/product-requirements/prd002-cli-enhancements.yaml

