prd_to_use_case_mapping:
  - use_case: rel02.0-uc001-build-hello-world
    prd: prd001-hello-world-binary
    why_required: |
      The use case exercises all PRD requirements by building and running the
      binary, verifying output, exit code, and file structure.
    coverage: R1.1, R1.2, R1.3, R2.1, R2.2, R2.3
  - use_case: rel03.0-uc002-version-output
    prd: prd002-cli-enhancements
    why_required: |
      Validates the --version flag prints the Version constant and exits 0
      without producing greeting output.
    coverage: R1.1, R1.2, R1.3
  - use_case: rel03.0-uc003-personalized-greeting
    prd: prd002-cli-enhancements
    why_required: |
      Validates the --name flag personalizes the greeting and that the default
      greeting is preserved when no flag is provided.
    coverage: R2.1, R2.2, R2.3
  - use_case: rel03.0-uc004-error-unknown-flag
    prd: prd002-cli-enhancements
    why_required: |
      Validates that unknown flags produce an error on stderr and exit code 1,
      exercising the flag package error handling path.
    coverage: R4.1, R4.2, R4.3

coverage_gaps: |
  prd002-cli-enhancements R3 (help flag) is not covered by a dedicated use
  case. The test suite includes a help flag test case, but no UC exercises
  it as a primary flow. This is acceptable because --help behavior is
  provided by the Go flag package with minimal custom code.

