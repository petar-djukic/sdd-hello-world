id: sdd-hello-world-roadmap
title: SDD Hello World Roadmap

releases:
  - version: "01.0"
    name: Initial project and scaffold integration
    status: done
    description: |
      Minimal Go binary, SDD project structure, and cobbler-scaffold integration.
      Phase 1 delivered the binary and documentation. Phase 2 scaffolded the
      orchestrator mage targets, published the module to the Go module proxy,
      and validated the full cobbler-scaffold E2E pipeline.
    use_cases: []

  - version: "02.0"
    name: Hello world binary from specifications
    status: pending
    description: |
      We implement the hello world binary from its SRD specification. The
      generation pipeline reads srd001-hello-world-binary and produces the Go
      source files. This release validates that cobbler-scaffold can generate
      code from specs in a clean repository.
    use_cases:
      - id: rel02.0-uc001-build-hello-world
        status: pending

  - version: "03.0"
    name: CLI enhancements
    status: pending
    description: |
      We add command-line flag support to the hello world binary: --version,
      --name, --help, and error handling for unknown flags. This release
      provides multiple use cases so the cobbler-scaffold generation pipeline
      exercises multi-cycle generation with per-UC validation and auto-advance.
    use_cases:
      - id: rel03.0-uc002-greeting-and-version
        status: pending
      - id: rel03.0-uc003-help-and-errors
        status: pending

  - version: "04.0"
    name: Configuration file support
    status: pending
    description: |
      We add JSON configuration file support via a --config flag. The config
      sets greeting name, template, and output format. This release provides
      12 R-items across 4 groups, requiring three or more stitch tasks and
      exercising cross-batch duplicate detection and partial UC completion
      gating in the cobbler-scaffold pipeline.
    use_cases:
      - id: rel04.0-uc004-config-loading
        status: pending
      - id: rel04.0-uc005-config-validation
        status: pending

prioritization:
  - Release 02.0 implements the binary from specifications so the generation pipeline has reproducible work to propose and execute.
  - Release 03.0 adds CLI flags to exercise multi-cycle generation with multiple use cases per release.
  - Release 04.0 adds config file support to exercise cross-batch duplicate detection with 12 R-items across 3+ stitch tasks.
